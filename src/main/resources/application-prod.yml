spring:
  datasource:
    url: jdbc:mysql://localhost:3306/productdb?useSSL=false&serverTimezone=UTC
    username: root
    password: "Elbedewi"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update   # غيّرتها إلى update للتطوير، اتركها validate في الإنتاج الحقيقي
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect   # استخدم MySQLDialect بدلاً من MySQL8Dialect
        jdbc:
          batch_size: 20
  sql:
    init:
      mode: never