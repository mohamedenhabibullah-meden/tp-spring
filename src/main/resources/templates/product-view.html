<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Détails du produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2>Détails du produit</h2>
<table class="table table-bordered">
    <tr><th>ID</th><td th:text="${product.id}">--</td></tr>
    <tr><th>Nom</th><td th:text="${product.name}">--</td></tr>
    <tr><th>Prix (MRU)</th><td th:text="${product.price}">--</td></tr>
    <tr><th>Description</th><td th:text="${product.description}">--</td></tr>
</table>
<a href="/products" class="btn btn-secondary">Retour</a>
</body>
</html>
